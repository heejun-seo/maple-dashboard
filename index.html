<script>
let products=[],dateCols=[];
let rankMonth='all',rankSubtab='revenue-top',catMonth='all',trendMonth='all',avgdayMonth='all';
let dailyChartInst=null,trendChartInst=null,filteredProds=[];
const APR_S=0,APR_E=28,MAY_S=28,MAY_E=59,JUN_S=59;
const LATE_START_CODES=new Set(['8809723591169','8881300806132','8800310920577','8800310920584','8800310920591']);
const LATE_START_IDX=26;

function parseLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(c===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=c;
  }
  res.push(cur);return res;
}
function parseCSV(text){
  const lines=text.replace(/^﻿/,'').replace(/\r/g,'').split('\n').filter(l=>l.trim());
  return{headers:parseLine(lines[0]),rows:lines.slice(1).map(l=>parseLine(l))};
}
function num(s){
  if(!s||s.trim()==='')return 0;
  return parseFloat(String(s).replace(/,/g,'').replace(/%/g,'').trim())||0;
}
function fWon(n,short){
  if(short){
    if(n>=1e8)return(n/1e8).toFixed(1)+'억';
    if(n>=1e4)return Math.round(n/1e4).toLocaleString()+'만';
    return n.toLocaleString();
  }
  return n.toLocaleString()+'원';
}
function fNum(n){return n.toLocaleString();}
function sellBadge(r){
  const c=r>=80?'excellent':r>=60?'good':r>=40?'caution':'warning';
  return`<span class="badge badge-${c}">${r.toFixed(0)}%</span>`;
}
function rankCircle(n){
  const c=n===1?'rank-1':n===2?'rank-2':n===3?'rank-3':'rank-other';
  return`<span class="rank-num ${c}">${n}</span>`;
}
function monthRange(m){
  if(m==='april')return[APR_S,APR_E];
  if(m==='may')return[MAY_S,MAY_E];
  if(m==='june')return[JUN_S,dateCols.length];
  return[0,dateCols.length];
}
function pRevenue(p,m){
  if(m==='all')return p.totalRevenue;
  const[s,e]=monthRange(m);
  return p.dailySales.slice(s,e).reduce((a,b)=>a+b,0)*p.price;
}
function pQty(p,m){
  if(m==='all')return p.totalSold;
  const[s,e]=monthRange(m);
  return p.dailySales.slice(s,e).reduce((a,b)=>a+b,0);
}
function pRate(p,m){
  if(m==='all')return p.totalSellRate;
  return p.totalOrder>0?pQty(p,m)/p.totalOrder*100:0;
}

function getStockoutIdx(p){
  const sales=p.dailySales;
  const startIdx=LATE_START_CODES.has(p.code)?LATE_START_IDX:0;
  // 마지막 판매일 기준으로만 품절 판단 (중간 공백은 재입고로 허용)
  let lastSaleIdx=-1;
  for(let i=sales.length-1;i>=startIdx;i--){
    if(sales[i]>0){lastSaleIdx=i;break;}
  }
  if(lastSaleIdx<startIdx)return startIdx; // 판매 이력 없음
  const trailingZeros=sales.length-lastSaleIdx-1;
  if(trailingZeros>=4)return lastSaleIdx+1; // 마지막 판매 이후 4일+ 연속 0 → 품절
  return sales.length; // 현재 판매 중
}

function calcAvgDay(p,month){
  const stockoutIdx=getStockoutIdx(p);
  const activeStart=LATE_START_CODES.has(p.code)?LATE_START_IDX:0;
  let rs,re;
  if(month==='all'){rs=activeStart;re=stockoutIdx;}
  else{
    const[ms,me]=monthRange(month);
    rs=Math.max(activeStart,ms);
    re=Math.min(stockoutIdx,me);
  }
  if(re<=rs)return{avg:0,activeDays:0,total:0,isStockout:stockoutIdx<dateCols.length};
  const slice=p.dailySales.slice(rs,re);
  const total=slice.reduce((a,b)=>a+b,0);
  return{avg:total/(re-rs),activeDays:re-rs,total,isStockout:stockoutIdx<dateCols.length};
}

    if(m)dateCols.push({idx:i,month:+m[1],day:+m[2],label:`${m[1]}/${m[2]}`});
  }
  products=rows.map(row=>{
    while(row.length<headers.length)row.push('0');
    return{
      code:(row[0]||'').trim(),name:(row[1]||'').trim(),
      category:(row[2]||'').trim(),price:num(row[3]),
      initialOrder:num(row[4]),reorder05:num(row[5]),reorder06:num(row[6]),
      totalOrder:num(row[7]),totalSold:num(row[8]),
      initialSellRate:num(row[9]),totalSellRate:num(row[10]),
      totalRevenue:num(row[11]),unitCost:num(row[12]),
      dailySales:row.slice(13).map(v=>num(v))
    };
  }).filter(p=>p.name&&p.name!=='상품명');
  filteredProds=[...products];
  const lc=dateCols[dateCols.length-1];
  document.getElementById('data-date-label').textContent=`데이터 기준: 4/3 ~ ${lc?lc.label:'?'}`;
  const sel=document.getElementById('trend-product');
  products.filter(p=>p.category!=='유상봉투').forEach(p=>{
    const o=document.createElement('option');o.value=p.code;o.textContent=p.name;sel.appendChild(o);
  });
  renderKPIs();renderTop5();renderStatusSummary();renderDailyChart();
  renderProductsTable();renderRankTable();renderCatTab();updateTrend();renderAvgdayTab();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}

function showTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='overview'&&dailyChartInst)setTimeout(()=>dailyChartInst.resize(),10);
  if(tab==='trends'&&trendChartInst)setTimeout(()=>trendChartInst.resize(),10);
}

function renderKPIs(){
  const nb=products.filter(p=>p.category!=='유상봉투');
  const totalRev=products.reduce((s,p)=>s+p.totalRevenue,0);
  const totalSold=products.reduce((s,p)=>s+p.totalSold,0);
  const totalOrder=products.reduce((s,p)=>s+p.totalOrder,0);
  const avgRate=nb.length?nb.reduce((s,p)=>s+p.totalSellRate,0)/nb.length:0;
  function mRev(m){const[s,e]=monthRange(m);return products.reduce((sum,p)=>sum+p.dailySales.slice(s,e).reduce((a,b)=>a+b,0)*p.price,0);}
  const cards=[
    {label:'총 매출 (VAT포함)',val:fWon(totalRev,true),sub:fWon(totalRev),cls:'green'},
    {label:'총 판매수량',val:fNum(totalSold)+'개',sub:`발주 ${fNum(totalOrder)}개`,cls:''},
    {label:'평균 판매율',val:avgRate.toFixed(1)+'%',sub:'쇼핑백 제외',cls:avgRate>=70?'green':avgRate>=50?'blue':'orange'},
    {label:'4월 매출',val:fWon(mRev('april'),true),sub:'4/3 ~ 4/30 · 28일',cls:''},
    {label:'5월 매출',val:fWon(mRev('may'),true),sub:'5/1 ~ 5/31 · 31일',cls:''},
    {label:'6월 매출',val:fWon(mRev('june'),true),sub:`6/1 ~ ${dateCols[dateCols.length-1]?.label||'?'}`,cls:'blue'},
  ];
  document.getElementById('kpi-grid').innerHTML=cards.map(c=>`
    <div class="kpi-card ${c.cls}"><div class="kpi-label">${c.label}</div>
    <div class="kpi-value">${c.val}</div><div class="kpi-sub">${c.sub}</div></div>`).join('');
}

function renderTop5(){
  const sorted=[...products].filter(p=>p.category!=='유상봉투').sort((a,b)=>b.totalRevenue-a.totalRevenue).slice(0,5);
  const maxRev=sorted[0]?.totalRevenue||1;
  const colors=['#16a34a','#2563eb','#9333ea','#ea580c','#0891b2'];
  document.getElementById('top5-list').innerHTML=sorted.map((p,i)=>`
    <div class="top5-item">
      <div class="top5-header">
        <span style="display:flex;align-items:center;gap:7px;min-width:0;">${rankCircle(i+1)}<span class="top5-name" title="${p.name}">${p.name}</span></span>
        <span class="top5-val">${fWon(p.totalRevenue,true)}</span>
      </div>
      <div class="top5-bar"><div class="top5-bar-fill" style="width:${(p.totalRevenue/maxRev*100).toFixed(0)}%;background:${colors[i]};"></div></div>
    </div>`).join('');
}

function renderStatusSummary(){
  const nb=products.filter(p=>p.category!=='유상봉투');
  const ex=nb.filter(p=>p.totalSellRate>=80);
  const gd=nb.filter(p=>p.totalSellRate>=60&&p.totalSellRate<80);
  const ca=nb.filter(p=>p.totalSellRate>=40&&p.totalSellRate<60);
  const wr=nb.filter(p=>p.totalSellRate<40);
  document.getElementById('status-row').innerHTML=[
    {n:ex.length,label:'우수 (80%+)',color:'#16a34a'},
    {n:gd.length,label:'양호 (60~79%)',color:'#2563eb'},
    {n:ca.length,label:'주의 (40~59%)',color:'#ea580c'},
    {n:wr.length,label:'위험 (<40%)',color:'#dc2626'},
  ].map(s=>`<div class="status-item" style="border-left-color:${s.color}"><div class="status-count" style="color:${s.color}">${s.n}</div><div class="status-label">${s.label}</div></div>`).join('');
  const exTop=ex.slice(0,4).map(p=>`${p.name}(${p.totalSellRate.toFixed(0)}%)`).join(' · ');
  const wrTop=wr.slice(0,4).map(p=>`${p.name}(${p.totalSellRate.toFixed(0)}%)`).join(' · ');
  document.getElementById('status-detail').innerHTML=`
    <div><span style="color:#15803d;font-weight:600;">🟢 우수</span>&nbsp;${exTop}</div>
    <div><span style="color:#dc2626;font-weight:600;">🔴 위험</span>&nbsp;${wrTop}</div>`;
}

function renderDailyChart(){
  const labels=dateCols.map(d=>d.label);
  const data=dateCols.map((_,i)=>products.reduce((s,p)=>s+(p.dailySales[i]||0),0));
  const bgC=dateCols.map(d=>d.month===4?'rgba(134,239,172,0.7)':d.month===5?'rgba(147,197,253,0.7)':'rgba(196,181,253,0.7)');
  const brC=dateCols.map(d=>d.month===4?'#16a34a':d.month===5?'#2563eb':'#7c3aed');
  if(dailyChartInst)dailyChartInst.destroy();
  dailyChartInst=new Chart(document.getElementById('dailyChart'),{
    type:'bar',
    data:{labels,datasets:[{label:'일별 판매수량',data,backgroundColor:bgC,borderColor:brC,borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fNum(c.parsed.y)+'개'}}},
      scales:{x:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{size:9},maxTicksLimit:20}},
              y:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',callback:v=>fNum(v)}}}}
  });
}

function setRankMonth(m,btn){
  rankMonth=m;
  document.querySelectorAll('#rank-month-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderRankTable();
}
function setSubtab(s,btn){
  rankSubtab=s;
  document.querySelectorAll('#subtab-nav .subtab-btn').forEach(b=>{b.classList.remove('active');b.classList.remove('worst-active');});
  btn.classList.add(s.includes('worst')?'worst-active':'active');renderRankTable();
}
function renderRankTable(){
  const nb=products.filter(p=>p.category!=='유상봉투');
  const isW=rankSubtab.includes('worst');
  let valFn,label,fmtFn;
  if(rankSubtab.includes('revenue')){valFn=p=>pRevenue(p,rankMonth);label='매출';fmtFn=v=>fWon(v,true);}
  else if(rankSubtab.includes('qty')){valFn=p=>pQty(p,rankMonth);label='판매수량';fmtFn=v=>fNum(v)+'개';}
  else{valFn=p=>pRate(p,rankMonth);label='판매율';fmtFn=v=>v.toFixed(1)+'%';}
  const ml={all:'전체',april:'4월',may:'5월',june:'6월'}[rankMonth];
  const isRateWorst=rankSubtab==='rate-worst';
  const pool=isRateWorst?nb.filter(p=>getStockoutIdx(p)>=dateCols.length):nb;
  const sorted=[...pool].map(p=>({...p,_v:valFn(p)})).sort((a,b)=>isW?a._v-b._v:b._v-a._v).slice(0,15);
  document.getElementById('rank-table').innerHTML=`
    <table class="data-table"><thead><tr>
      <th style="width:40px">순위</th><th>제품명</th><th>카테고리</th>
      <th class="r">${ml} ${label}</th><th class="r">누적 판매율</th><th class="r">총 매출</th>
    </tr></thead><tbody>${sorted.map((p,i)=>`<tr>
      <td>${rankCircle(i+1)}</td>
      <td style="font-weight:500;min-width:140px">${p.name}</td>
      <td style="color:#64748b">${p.category}</td>
      <td class="r" style="font-weight:700;color:${isW?'#dc2626':'#15803d'}">${fmtFn(p._v)}</td>
      <td class="r">${sellBadge(p.totalSellRate)}</td>
      <td class="r" style="color:#64748b">${fWon(p.totalRevenue,true)}</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderProductsTable(){filteredProds=[...products];renderProdList();}
function filterProducts(){
  const q=document.getElementById('product-search').value.toLowerCase();
  filteredProds=products.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q));
  renderProdList();
}

      <th>제품명</th><th>카테고리</th><th class="r">판매가</th><th class="r">발주수량</th>
      <th class="r">판매수량</th><th class="r">판매율</th><th class="r">총 매출</th>

    </tr></thead><tbody>${filteredProds.map(p=>{

        <td class="r">${sellBadge(p.totalSellRate)}</td>

        <td class="r" style="color:#64748b">${fNum(aQ)}</td>
        <td class="r" style="color:#64748b">${fNum(mQ)}</td>

function setCatMonth(m,btn){
  catMonth=m;
  document.querySelectorAll('#cat-month-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderCatTab();
}
function renderCatTab(){
  const nb=products.filter(p=>p.category!=='유상봉투');
  const catMap={};
  nb.forEach(p=>{
    if(!catMap[p.category])catMap[p.category]={products:[],revenue:0,qty:0};
    catMap[p.category].products.push(p);
    catMap[p.category].revenue+=pRevenue(p,catMonth);
    catMap[p.category].qty+=pQty(p,catMonth);
  });
  const cats=Object.entries(catMap)
    .map(([name,d])=>({name,...d,avgRate:d.products.reduce((s,p)=>s+p.totalSellRate,0)/d.products.length}))
    .sort((a,b)=>b.revenue-a.revenue);
  const maxRev=cats[0]?.revenue||1;
  const maxQty=Math.max(...cats.map(c=>c.qty))||1;
  const totalRev=cats.reduce((s,c)=>s+c.revenue,0)||1;
  document.getElementById('cat-revenue-bars').innerHTML=cats.map(c=>`
    <div class="cat-bar-row">
      <div class="cat-bar-label"><span>${c.name}</span><span style="font-weight:600;color:#15803d">${fWon(c.revenue,true)}</span></div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(c.revenue/maxRev*100).toFixed(0)}%;background:#16a34a;"></div></div>
    </div>`).join('');
  document.getElementById('cat-qty-bars').innerHTML=cats.map(c=>`
    <div class="cat-bar-row">
      <div class="cat-bar-label"><span>${c.name}</span><span style="font-weight:600;color:#2563eb">${fNum(c.qty)}개</span></div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(c.qty/maxQty*100).toFixed(0)}%;background:#3b82f6;"></div></div>
    </div>`).join('');
  document.getElementById('cat-table').innerHTML=`
    <table class="data-table"><thead><tr>
      <th>카테고리</th><th class="r">제품수</th><th class="r">매출</th>
      <th class="r">비중</th><th class="r">판매수량</th><th class="r">평균 판매율</th>
    </tr></thead><tbody>${cats.map(c=>`<tr>
      <td style="font-weight:500">${c.name}</td>
      <td class="r" style="color:#64748b">${c.products.length}</td>
      <td class="r" style="font-weight:600;color:#15803d">${fWon(c.revenue,true)}</td>
      <td class="r"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;">
        <div class="mini-bar" style="width:50px;"><div class="mini-bar-fill" style="width:${(c.revenue/totalRev*100).toFixed(0)}%;background:#16a34a;"></div></div>
        <span style="color:#64748b;font-size:11px">${(c.revenue/totalRev*100).toFixed(1)}%</span>
      </div></td>
      <td class="r" style="color:#64748b">${fNum(c.qty)}</td>
      <td class="r">${sellBadge(c.avgRate)}</td>
    </tr>`).join('')}</tbody></table>`;
}

function setTrendMonth(m,btn){
  trendMonth=m;
  document.querySelectorAll('#trend-month-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');updateTrend();
}
function updateTrend(){
  const code=document.getElementById('trend-product').value;
  const view=document.getElementById('trend-view').value;
  const selP=code==='all'?products.filter(p=>p.category!=='유상봉투'):products.filter(p=>p.code===code);
  const[rs,re]=monthRange(trendMonth);
  const cols=dateCols.slice(rs,re);
  let labels,data;
  if(view==='weekly'){
    const weeks=[];let wk={label:'',tot:0};
    cols.forEach((d,i)=>{
      const dow=new Date(2026,d.month-1,d.day).getDay();
      wk.tot+=selP.reduce((s,p)=>s+(p.dailySales[rs+i]||0),0);
      if(dow===0||i===cols.length-1){wk.label=d.label;weeks.push({...wk});wk={label:'',tot:0};}
    });
    labels=weeks.map(w=>w.label);data=weeks.map(w=>w.tot);
  }else{
    labels=cols.map(d=>d.label);
    data=cols.map((_,i)=>selP.reduce((s,p)=>s+(p.dailySales[rs+i]||0),0));
  }
  if(trendChartInst)trendChartInst.destroy();
  const color=code==='all'?'#16a34a':'#2563eb';
  const bgColor=code==='all'?'rgba(22,163,74,0.08)':'rgba(37,99,235,0.08)';
  trendChartInst=new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{labels,datasets:[{
      label:code==='all'?'전체 판매수량':selP[0]?.name||'',
      data,borderColor:color,backgroundColor:bgColor,
      borderWidth:2,pointRadius:data.length>30?2:4,tension:0.3,fill:true
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748b',font:{size:12}}},tooltip:{callbacks:{label:c=>fNum(c.parsed.y)+'개'}}},
      scales:{x:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{size:10}}},
              y:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',callback:v=>fNum(v)}}}}
  });
  const total=data.reduce((a,b)=>a+b,0);
  const avg=total/(data.length||1);
  const maxV=Math.max(...data,0);
  document.getElementById('trend-summary').innerHTML=`
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">
      <div><div class="kpi-label">${code==='all'?'전체':selP[0]?.name||''} 총 판매</div>
        <div style="font-size:18px;font-weight:700;">${fNum(total)}개</div></div>
      <div><div class="kpi-label">일 평균</div><div style="font-size:18px;font-weight:700;">${avg.toFixed(1)}개</div></div>
      <div><div class="kpi-label">최고 일 판매</div><div style="font-size:18px;font-weight:700;color:#15803d;">${fNum(maxV)}개</div></div>
      ${code!=='all'&&selP[0]?`
      <div><div class="kpi-label">판매율</div><div style="font-size:18px;font-weight:700;">${sellBadge(selP[0].totalSellRate)}</div></div>
      <div><div class="kpi-label">총 매출</div><div style="font-size:18px;font-weight:700;color:#15803d;">${fWon(selP[0].totalRevenue,true)}</div></div>`:''}
    </div>`;
}

function setAvgdayMonth(m,btn){
  avgdayMonth=m;
  document.querySelectorAll('#avgday-month-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderAvgdayTab();
}

function renderAvgdayTab(){
  const nb=products.filter(p=>p.category!=='유상봉투');
  const rows=nb.map(p=>{
    const{avg,activeDays,total,isStockout}=calcAvgDay(p,avgdayMonth);
    return{...p,avg,activeDays,total,isStockout};
  }).sort((a,b)=>b.avg-a.avg);

  const totalActiveDays=dateCols.length;
  document.getElementById('avgday-table').innerHTML=`
    <table class="data-table"><thead><tr>
      <th style="width:40px">순위</th>
      <th>제품명</th>
      <th>카테고리</th>
      <th class="r">활성 판매일</th>
      <th class="r">판매수량 합계</th>
      <th class="r" style="color:#15803d">일 평균 판매수량</th>
    </tr></thead><tbody>${rows.map((p,i)=>`<tr>
      <td>${rankCircle(i+1)}</td>
      <td style="font-weight:500;min-width:150px">${p.name}${p.isStockout?'<span class="stockout-badge">품절</span>':''}</td>
      <td style="color:#64748b;font-size:11px">${p.category}</td>
      <td class="r" style="color:#64748b">${p.activeDays}일</td>
      <td class="r" style="color:#64748b">${fNum(p.total)}개</td>
      <td class="r" style="font-weight:700;color:${p.avg>=30?'#15803d':p.avg>=15?'#1d4ed8':p.avg>=5?'#1e293b':'#94a3b8'}">${p.avg.toFixed(1)}개/일</td>
    </tr>`).join('')}</tbody></table>`;
}

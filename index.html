  <div style={{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"14px 16px",borderLeft:"3px solid "+accent}}>
    <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
    <div style={{fontSize:22,fontWeight:500,color:"var(--color-text-primary)",lineHeight:1}}>{value}</div>
    {sub && <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:5}}>{sub}</div>}
  </div>
);
const RateBadge = ({rate}) => (

);
const SL = ({children}) => (

);
function RankList({items, valueKey, valueFmt, barColor, showRateBadge=true}){
  const mx = Math.max(...items.map(r => r[valueKey]), 1);
  return items.map((r,i) => (
    <div key={r.code} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      <span style={{width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,flexShrink:0,background:i<3?"#EEEDFE":"var(--color-background-secondary)",color:i<3?"#534AB7":"var(--color-text-tertiary)"}}>{i+1}</span>
      <span style={{flex:"0 0 200px",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</span>
      <div style={{flex:1,background:"var(--color-background-secondary)",borderRadius:3,height:8}}>
        <div style={{width:(r[valueKey]/mx*100)+"%",background:barColor,height:"100%",borderRadius:3}}/>
      </div>
      <span style={{fontSize:12,color:"var(--color-text-secondary)",flexShrink:0,width:72,textAlign:"right"}}>{valueFmt(r[valueKey])}</span>
      {showRateBadge && <RateBadge rate={r.rate}/>}
    </div>
  ));
}
function MiniSparkline({data, color}){
  const d = data.slice(0,59);
  const mx = Math.max(...d,1);
  const pts = d.map((v,i) => `${(i/(d.length-1))*120},${28-Math.max((v/mx)*28,0)}`).join(" ");
  return <svg width={120} height={28} style={{display:"block"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

                  const x=pL+i*(bw+2),bh=Math.max((v/mx)*H,v>0?2:0),y=H-bh;
                  const ds=DATES[vm==="weekly"?i*7:i]||"",dn=parseInt(ds.split("/")[1]),mn=ds.startsWith("5")?4:3;
                  const dw=new Date(2026,mn,dn).getDay(),iw=vm==="daily"&&(dw===0||dw===6);
                  return <rect key={i} x={x} y={y} width={bw} height={bh} fill={iw?"#D85A30":"#534AB7"} rx="1.5" opacity="0.85"/>;
                })}
                {cLabels.map((l,i)=>{if(vm==="daily"&&i%7!==0)return null;const x=pL+i*(bw+2)+bw/2;return <text key={i} x={x} y={H+pB-4} fontSize="9" fill="var(--color-text-tertiary)" textAnchor="middle">{l}</text>;})}
              </svg>;
            })()}
          </Card>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[{label:"4월 판매량 (4/3~4/30)",val:trendData.slice(0,28).reduce((a,b)=>a+b,0)},{label:"5월 판매량 (5/1~5/31)",val:trendData.slice(28).reduce((a,b)=>a+b,0)}].map(m=>(
              <Card key={m.label}>
                <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{m.label}</div>
                <div style={{fontSize:24,fontWeight:500}}>{m.val.toLocaleString()}개</div>
                {sp && <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:4}}>{(m.val*sp.price).toLocaleString()}원</div>}
              </Card>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
